<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>三福生活新「搭」案</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="css/style.css?v=20260609d">
</head>
<body>
  <div class="phone-stage" aria-label="1080x2400 页面预览舞台">
    <main class="phone-shell" aria-label="三福生活新搭案手机互动页">
      <div class="swiper h5-swiper">
        <div class="swiper-wrapper">
          <section class="swiper-slide" id="slide-home"></section>
          <section class="swiper-slide" id="slide-intro"></section>
          <section class="swiper-slide" id="slide-scene"></section>
          <section class="swiper-slide" id="slide-story"></section>
          <section class="swiper-slide" id="slide-generate-persona"></section>
          <section class="swiper-slide" id="slide-loading"></section>
          <section class="swiper-slide" id="slide-result"></section>
        </div>
      </div>
    </main>
  </div>
  <div class="toast" role="status" aria-live="polite"></div>

   <audio id="bgm" loop preload="auto" playsinline>
      <source src="./music/The Process-Lakey Inspired.mp3" type="audio/mpeg">
   </audio>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script src="js/main.js?v=20260609d"></script>
  <!-- 背景音乐 -->
  <audio id="bgm" loop preload="auto" playsinline>
    <source src="./music/The Process-Lakey Inspired.mp3" type="audio/mpeg">
  </audio>

  <!-- 音乐按钮 -->
  <button id="musicBtn" class="music-btn" aria-label="播放或暂停音乐">
    ♪
  </button>

  <style>
    .music-btn {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 99999;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.88);
      color: #ff5f9e;
      font-size: 24px;
      font-weight: 700;
      line-height: 46px;
      text-align: center;
      box-shadow: 0 8px 22px rgba(255, 95, 158, 0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
    }

    .music-btn.is-playing {
      color: #fff;
      background: linear-gradient(135deg, #ff8abf, #ffd1e3);
      animation: musicRotate 3s linear infinite;
    }

    @keyframes musicRotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('musicBtn');

    bgm.volume = 0.35;

    async function playMusic() {
      try {
        await bgm.play();
        musicBtn.classList.add('is-playing');
      } catch (error) {
        console.log('浏览器限制自动播放，需要用户点击后播放音乐。');
      }
    }

    function pauseMusic() {
      bgm.pause();
      musicBtn.classList.remove('is-playing');
    }

    musicBtn.addEventListener('click', function (event) {
      event.stopPropagation();

      if (bgm.paused) {
        playMusic();
      } else {
        pauseMusic();
      }
    });

    // 用户第一次点击/触摸页面时，尝试自动播放音乐
    document.addEventListener('click', playMusic, { once: true });
    document.addEventListener('touchstart', playMusic, { once: true });
  </script>
</body>
</html>
</body>
</html>
